<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>合照 & 视频墙 · 青岩万花综合大学</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <script>
      tailwind = {
        config: {
          theme: {
            extend: {
              colors: {
                ink: '#0b3a3f',
                inkDeep: '#121212',
                gold: '#d4af37'
              },
              fontFamily: {
                display: ['Ma Shan Zheng', 'cursive'],
                body: ['Noto Serif SC', 'serif']
              }
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      .nav-link { @apply text-slate-200 hover:text-gold transition-colors py-2; }
      .filter-chip { @apply px-3 py-1 rounded-full border border-gold/30 text-sm text-slate-300 hover:bg-gold/10 transition-colors; }
      .filter-chip.active { @apply bg-gold/20 border-gold text-gold; }
      .paper-panel { @apply bg-ink/30 backdrop-blur-sm; }
    </style>
  </head>
  <body class="min-h-screen bg-[#07181b] text-slate-100 font-body">
    <div class="site-shell">
      <header class="sticky top-0 z-40 border-b border-gold/40 bg-[#07181b]/95 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 lg:px-8">
          <a href="index.html" class="flex items-center gap-3">
            <div class="flex h-11 w-11 items-center justify-center rounded-full border border-gold/70 bg-ink text-lg font-display text-gold">山</div>
            <div>
              <p class="font-display text-xl text-gold">青岩万花综合大学</p>
              <p class="text-xs uppercase tracking-[0.3em] text-slate-400">JX3 · 师门主页</p>
            </div>
          </a>
          <nav class="hidden items-center gap-6 lg:flex">
            <a class="nav-link" href="index.html">首页</a>
            <a class="nav-link" href="pedigree.html">谱系图</a>
            <a class="nav-link" href="gallery.html">相册</a>
            <a class="nav-link" href="profile.html">个人主页</a>
            <a class="nav-link" href="tools.html">实用工具</a>
            <a class="nav-link" href="stats.html">团本统计</a>
            <a class="nav-link" href="feed.html">动态墙</a>
          </nav>
          <div class="flex items-center gap-2 sm:gap-4">
            <button class="rounded-full border border-gold/40 px-3 py-2 text-sm text-gold lg:hidden" data-nav-toggle>☰</button>
          </div>
        </div>
        <div class="hidden border-t border-gold/20 bg-black/20 px-4 py-3 lg:hidden" data-mobile-nav>
          <div class="flex flex-col gap-2">
            <a class="nav-link" href="index.html">首页</a>
            <a class="nav-link" href="pedigree.html">谱系图</a>
            <a class="nav-link" href="gallery.html">相册</a>
            <a class="nav-link" href="profile.html">个人主页</a>
            <a class="nav-link" href="tools.html">实用工具</a>
            <a class="nav-link" href="stats.html">团本统计</a>
            <a class="nav-link" href="feed.html">动态墙</a>
          </div>
        </div>
      </header>

      <main id="top" class="mx-auto max-w-7xl px-4 py-8 lg:px-8">
        <section class="paper-panel rounded-[24px] border border-gold/30 p-6">
          <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
            <div>
              <p class="font-display text-3xl text-gold">合照 & 视频墙</p>
              <p class="mt-2 text-slate-400">分类标签、上传入口与瀑布流浏览。全员同步相册</p>
            </div>
            <div class="flex flex-wrap gap-2">
              <button class="filter-chip active" data-gallery-filter="all">全部</button>
              <button class="filter-chip" data-gallery-filter="合照">团本合照</button>
              <button class="filter-chip" data-gallery-filter="日常">团建日常</button>
              <button class="filter-chip" data-gallery-filter="欧皇">奇遇欧皇</button>
              <button class="filter-chip" data-gallery-filter="外观">外观分享</button>
            </div>
          </div>
          <form id="gallery-form" class="mt-6 rounded-[20px] border border-gold/20 bg-[#0c2b31] p-4">
            <div class="grid gap-3 md:grid-cols-2">
              <input id="gallery-title" class="rounded-xl border border-gold/20 bg-[#07181b] px-3 py-2 text-slate-100" placeholder="标题" required />
              <input id="gallery-tag" class="rounded-xl border border-gold/20 bg-[#07181b] px-3 py-2 text-slate-100" placeholder="标签（合照/日常/欧皇/外观）" required />
              <textarea id="gallery-description" class="md:col-span-2 min-h-[90px] rounded-xl border border-gold/20 bg-[#07181b] px-3 py-2 text-slate-100" placeholder="描述"></textarea>
              <input id="gallery-image" type="file" accept="image/*" class="md:col-span-2 rounded-xl border border-gold/20 bg-[#07181b] px-3 py-2 text-slate-100" required />
            </div>
            <button type="submit" id="upload-btn" class="mt-3 rounded-full bg-gold px-4 py-2 text-sm font-semibold text-ink">上传相册</button>
            <div id="upload-status" class="mt-2 text-sm text-slate-300"></div>
          </form>
          <div id="gallery-grid" class="mt-8 columns-1 gap-4 md:columns-2 xl:columns-3 space-y-4"></div>
        </section>
      </main>

      <div class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 p-4" data-modal>
        <div class="max-w-3xl rounded-[24px] border border-gold/40 bg-[#07181b] p-4">
          <img src="" alt="放大预览" data-modal-image class="max-h-[70vh] w-full rounded-[16px] object-contain" />
          <video data-modal-video controls class="max-h-[70vh] w-full rounded-[16px] hidden"></video>
          <div class="mt-4 flex flex-wrap justify-between gap-3 text-sm text-slate-300">
            <div data-modal-info></div>
            <div class="flex gap-2">
              <button class="rounded-full border border-gold/40 px-3 py-2 text-gold" data-modal-close>关闭</button>
            </div>
          </div>
        </div>
      </div>

      <footer class="border-t border-gold/20 bg-[#07181b] px-4 py-8 text-sm text-slate-400">
        <div class="mx-auto flex max-w-7xl flex-col gap-4 md:flex-row md:items-center md:justify-between lg:px-8">
          <div>
            <p class="font-display text-xl text-gold">青岩万花综合大学</p>
            <p>创qq群于 2024 年 10 月 20 日 · 免责声明：内容仅作纪念与分享。</p>
          </div>
        </div>
      </footer>
    </div>

    <script>
      // ====================== 配置区 ======================
      const GLOBAL_ALBUM_JSON_URL = 'https://cdn.jsdelivr.net/gh/blankx10/js3/global-album.json';
      const UPLOAD_API_URL = 'https://your-domestic-upload-api.example.com/upload';
      const MAX_FILE_SIZE = 2 * 1024 * 1024;
      const ALLOWED_TYPES = ['image/jpeg', 'image/png', 'image/webp'];
      const FALLBACK_GALLERY = [
        {
          id: 1,
          title: '师门合照示例',
          tag: '合照',
          description: '初始模板，替换为你的国内 CDN 图片链接。',
          imgUrl: 'images/hero-banner.svg',
          type: 'image',
          createAt: '2026-07-14T00:00:00.000Z'
        },
        {
          id: 2,
          title: '团建日常示例',
          tag: '日常',
          description: '替换为你自己的图片外链即可。',
          imgUrl: 'images/portrait-4.svg',
          type: 'image',
          createAt: '2026-07-14T00:00:00.000Z'
        }
      ];
      // ===================================================

      // 移动端导航
      const navToggle = document.querySelector('[data-nav-toggle]');
      const mobileNav = document.querySelector('[data-mobile-nav]');
      navToggle?.addEventListener('click', () => {
        mobileNav.classList.toggle('hidden');
      });

      let galleryData = [];
      let currentFilter = 'all';
      const galleryGrid = document.getElementById('gallery-grid');
      const galleryForm = document.getElementById('gallery-form');
      const uploadStatus = document.getElementById('upload-status');
      const filterButtons = document.querySelectorAll('[data-gallery-filter]');
      const modal = document.querySelector('[data-modal]');
      const modalImage = document.querySelector('[data-modal-image]');
      const modalVideo = document.querySelector('[data-modal-video]');
      const modalInfo = document.querySelector('[data-modal-info]');
      const modalClose = document.querySelector('[data-modal-close]');

      function setUploadStatus(message, isError = false) {
        uploadStatus.textContent = message;
        uploadStatus.className = `mt-2 text-sm ${isError ? 'text-red-400' : 'text-gold'}`;
      }

      async function loadGallery() {
        setUploadStatus('正在加载全局相册数据...', false);
        try {
          const res = await fetch(GLOBAL_ALBUM_JSON_URL, { cache: 'no-cache' });
          if (!res.ok) throw new Error('远端 JSON 响应异常');
          const data = await res.json();
          if (!Array.isArray(data)) throw new Error('相册数据格式不正确');
          galleryData = data;
          renderGallery(currentFilter);
          setUploadStatus('已加载全局相册数据。', false);
        } catch (err) {
          console.error('加载相册失败', err);
          galleryData = FALLBACK_GALLERY;
          renderGallery(currentFilter);
          setUploadStatus('远端相册加载失败，已使用本地模板数据。', false);
        }
      }

      function renderGallery(filter = 'all') {
        currentFilter = filter;
        galleryGrid.innerHTML = '';
        const filtered = filter === 'all' ? galleryData : galleryData.filter((item) => item.tag === filter);

        if (!filtered.length) {
          galleryGrid.innerHTML = '<div class="rounded-2xl border border-gold/20 bg-[#0c2b31]/60 p-4 text-sm text-slate-300">暂无符合条件的照片。</div>';
          return;
        }

        filtered.forEach((item) => {
          const card = document.createElement('div');
          card.className = 'break-inside-avoid rounded-2xl border border-gold/20 bg-[#0c2b31]/60 overflow-hidden';
          const imageUrl = item.imgUrl || item.url || item.image || '';
          const mediaHtml = item.type === 'video'
            ? `<video src="${imageUrl}" class="w-full" controls></video>`
            : `<img src="${imageUrl}" alt="${item.title}" class="w-full cursor-pointer" data-preview="${imageUrl}" data-type="${item.type || 'image'}" data-desc="${item.description || ''}" data-title="${item.title}">`;
          card.innerHTML = `
            ${mediaHtml}
            <div class="p-3">
              <h4 class="font-display text-lg text-gold">${item.title}</h4>
              <p class="mt-1 text-xs text-slate-400">标签：${item.tag}</p>
              <p class="mt-2 text-sm text-slate-300">${item.description || ''}</p>
            </div>
          `;
          galleryGrid.appendChild(card);
        });

        document.querySelectorAll('[data-preview]').forEach((img) => {
          img.addEventListener('click', () => {
            const url = img.dataset.preview;
            const type = img.dataset.type;
            const desc = img.dataset.desc;
            const title = img.dataset.title;
            modalImage.classList.add('hidden');
            modalVideo.classList.add('hidden');
            if (type === 'video') {
              modalVideo.src = url;
              modalVideo.classList.remove('hidden');
            } else {
              modalImage.src = url;
              modalImage.classList.remove('hidden');
            }
            modalInfo.innerText = `${title} | ${desc}`;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
          });
        });
      }

      modalClose.addEventListener('click', () => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        modalVideo.pause();
      });

      filterButtons.forEach((btn) => {
        btn.addEventListener('click', () => {
          filterButtons.forEach((item) => item.classList.remove('active'));
          btn.classList.add('active');
          renderGallery(btn.dataset.galleryFilter);
        });
      });

      galleryForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const title = document.getElementById('gallery-title').value.trim();
        const tag = document.getElementById('gallery-tag').value.trim();
        const description = document.getElementById('gallery-description').value.trim();
        const fileInput = document.getElementById('gallery-image');
        const file = fileInput && fileInput.files && fileInput.files[0];

        if (!file) {
          setUploadStatus('请选择一张图片。', true);
          return;
        }

        if (file.size > MAX_FILE_SIZE) {
          setUploadStatus('图片大小超限，请压缩到 2MB 以内。', true);
          return;
        }

        if (!ALLOWED_TYPES.includes(file.type)) {
          setUploadStatus('只支持 jpg / png / webp 格式。', true);
          return;
        }

        if (!UPLOAD_API_URL || UPLOAD_API_URL.includes('your-domestic-upload-api')) {
          setUploadStatus('上传接口尚未配置，请先在 gallery.html 的配置区替换为你的国内中转接口地址。', true);
          return;
        }

        setUploadStatus('正在上传图片到国内中转接口...', false);

        try {
          const formData = new FormData();
          formData.append('file', file);
          const response = await fetch(UPLOAD_API_URL, {
            method: 'POST',
            body: formData
          });

          if (!response.ok) {
            throw new Error(`上传接口返回 ${response.status}`);
          }

          const result = await response.json().catch(() => ({}));
          const imgUrl = result.imgUrl || result.url || result.data?.url || result.data?.imgUrl || '';

          if (!imgUrl) {
            throw new Error('上传接口未返回图片地址');
          }

          galleryData.unshift({
            id: Date.now(),
            title: title || '新上传照片',
            tag: tag || '日常',
            description: description || '已通过国内上传接口生成图片链接。',
            imgUrl,
            type: 'image',
            createAt: new Date().toISOString()
          });

          renderGallery(currentFilter);
          setUploadStatus('上传成功，图片链接已加入当前相册。请把这条记录同步到 global-album.json。', false);
          galleryForm.reset();
        } catch (err) {
          console.error(err);
          setUploadStatus(`上传失败：${err.message}`, true);
        }
      });

      loadGallery();
    </script>
  </body>
</html>
