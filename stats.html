<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>团本统计 · 青岩万花综合大学</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet" />
    <script>
      tailwind = {
        config: {
          theme: {
            extend: {
              colors: {
                ink: '#0b3a3f',
                inkDeep: '#121212',
                gold: '#d4af37'
              },
              fontFamily: {
                display: ['Ma Shan Zheng', 'cursive'],
                body: ['Noto Serif SC', 'serif']
              }
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="min-h-screen bg-[#07181b] text-slate-100 font-body">
    <div class="site-shell">
      <header class="sticky top-0 z-40 border-b border-gold/40 bg-[#07181b]/95 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 lg:px-8">
          <a href="index.html" class="flex items-center gap-3">
            <div class="flex h-11 w-11 items-center justify-center rounded-full border border-gold/70 bg-ink text-lg font-display text-gold">山</div>
            <div>
              <p class="font-display text-xl text-gold">青岩万花综合大学</p>
              <p class="text-xs uppercase tracking-[0.3em] text-slate-400">JX3 · 师门主页</p>
            </div>
          </a>
          <nav class="hidden items-center gap-6 lg:flex">
            <a class="nav-link" href="index.html">首页</a>
            <a class="nav-link" href="pedigree.html">谱系图</a>
            <a class="nav-link" href="gallery.html">相册</a>
            <a class="nav-link" href="profile.html">个人主页</a>
            <a class="nav-link" href="tools.html">实用工具</a>
            <a class="nav-link" href="stats.html">团本统计</a>
            <a class="nav-link" href="feed.html">动态墙</a>
          </nav>
          <div class="flex items-center gap-2 sm:gap-4">
            <button class="rounded-full border border-gold/40 px-3 py-2 text-sm text-gold lg:hidden" data-nav-toggle>☰</button>
          </div>
        </div>
        <div class="hidden border-t border-gold/20 bg-black/20 px-4 py-3 lg:hidden" data-mobile-nav>
          <div class="flex flex-col gap-2">
            <a class="nav-link" href="index.html">首页</a>
            <a class="nav-link" href="pedigree.html">谱系图</a>
            <a class="nav-link" href="gallery.html">相册</a>
            <a class="nav-link" href="profile.html">个人主页</a>
            <a class="nav-link" href="tools.html">实用工具</a>
            <a class="nav-link" href="stats.html">团本统计</a>
            <a class="nav-link" href="feed.html">动态墙</a>
          </div>
        </div>
      </header>

      <main id="top" class="mx-auto max-w-7xl px-4 py-8 lg:px-8">
        <section class="paper-panel rounded-[24px] border border-gold/30 p-6">
          <p class="font-display text-3xl text-gold">团本统计</p>
          <div id="stats-summary" class="mt-6"></div>
          <div class="mt-8 overflow-x-auto">
            <table class="min-w-full rounded-[20px] border border-gold/20 text-left text-sm text-slate-300">
              <thead class="bg-[#0c2b31] text-gold">
                <tr>
                  <th class="p-3">时间</th>
                  <th class="p-3">团本名称</th>
                  <th class="p-3">参与成员</th>
                  <th class="p-3">通关状态</th>
                  <th class="p-3">掉落 / 分红</th>
                </tr>
              </thead>
              <tbody id="stats-table-body"></tbody>
            </table>
          </div>
          <form id="stats-form" class="mt-6 rounded-[20px] border border-gold/20 bg-[#0c2b31] p-4">
            <p class="font-display text-2xl text-gold">添加团本记录</p>
            <div class="mt-4 grid gap-3 md:grid-cols-2">
              <input id="stats-time" class="rounded-xl border border-gold/20 bg-[#07181b] px-3 py-2 text-slate-100" placeholder="时间" />
              <input id="stats-name" class="rounded-xl border border-gold/20 bg-[#07181b] px-3 py-2 text-slate-100" placeholder="团本名称" />
              <input id="stats-members" class="rounded-xl border border-gold/20 bg-[#07181b] px-3 py-2 text-slate-100" placeholder="参与成员" />
              <input id="stats-status" class="rounded-xl border border-gold/20 bg-[#07181b] px-3 py-2 text-slate-100" placeholder="通关状态" />
              <textarea id="stats-drop" class="md:col-span-2 min-h-[90px] rounded-xl border border-gold/20 bg-[#07181b] px-3 py-2 text-slate-100" placeholder="掉落记录 / 分红"></textarea>
            </div>
            <button class="mt-4 rounded-full bg-gold px-4 py-2 font-semibold text-ink">提交记录</button>
          </form>
        </section>
      </main>

      <footer class="border-t border-gold/20 bg-[#07181b] px-4 py-8 text-sm text-slate-400">
        <div class="mx-auto flex max-w-7xl flex-col gap-4 md:flex-row md:items-center md:justify-between lg:px-8">
          <div>
            <p class="font-display text-xl text-gold">青岩万花综合大学</p>
            <p>创qq群于 2024 年 10 月 20 日 · 免责声明：内容仅作纪念与分享。</p>
          </div>
        </div>
      </footer>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
